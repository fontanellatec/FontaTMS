<div class="page-container controle-frota-page">


  <!-- Seção de Filtros -->
  <app-filter-section 
    [title]="title"
    [filters]="filters"
    [(collapsed)]="filtersCollapsed"
    (filtersChange)="onFiltersChange($event)">
  </app-filter-section>

  <!-- Seção de KPIs -->
  <app-kpi-section 
    [title]="kpiTitle"
    [kpis]="kpis"
    [(collapsed)]="kpisCollapsed">
  </app-kpi-section>



  <!-- Grid padronizado -->
  <app-grid-section
    title="Listagem de Frota"
    [columns]="gridColumns"
    [rows]="filtered"
    [(collapsed)]="gridCollapsed"
    [showActions]="true"
    [actions]="gridActions"
    [page]="page"
    [pageSize]="pageSize"
    [pageSizeOptions]="pageSizeOptions"
    [horizontalScroll]="true"
    [verticalScroll]="true"
    [bodyMaxHeight]="560"
    (pageChange)="page = $event"
    (pageSizeChange)="setPageSize($event)"
    (rowClick)="vincular($event)"
    (actionClick)="onGridAction($event)">
  </app-grid-section>

  <!-- Modal de Vínculo (novo componente compartilhado) -->
  <app-tab-modal
    [open]="vinculoModalOpen"
    (openChange)="vinculoModalOpen = $event"
    [title]="'Vínculo Veículo'"
    [tabs]="vinculoTabs"
    [(activeTabId)]="vinculoTab"
    size="xl">
    <div modal-actions>
      <button class="btn" (click)="fecharVinculoModal()">Fechar</button>
      <button class="btn btn-primary" (click)="salvarVinculo()">Salvar</button>
    </div>
  </app-tab-modal>

  <!-- Conteúdos das abas como templates -->
  <ng-template #tplMotorista>
    <div class="motorista-form">
      <div class="muted" style="margin-bottom:8px;">Coordenador: {{ selectedRecord?.gestor }}</div>

      <!-- Seção TOP: Data/Hora/Tipo e Veículo/Motorista -->
      <div class="motorista-section">
        <!-- Linha 1: Data, Hora, Tipo -->
        <div class="form-grid cols-3">
          <label class="pv-label">
            <span>Data</span>
            <input class="pv-input" type="date" [(ngModel)]="vinculo.data" placeholder="dd/mm/aaaa" />
          </label>
          <label class="pv-label">
            <span>Hora</span>
            <input class="pv-input" type="time" [(ngModel)]="vinculo.hora" placeholder="hh:mm" />
          </label>
          <label class="pv-label">
            <span>Tipo</span>
            <select class="pv-input" [(ngModel)]="vinculo.tipo">
              <option>Saída</option>
              <option>Entrada</option>
            </select>
          </label>
        </div>

        <!-- Linha 2: Veículo, Motorista -->
        <div class="form-grid">
          <label class="pv-label">
            <span>Veículo</span>
            <div class="inline">
              <input class="pv-input" [(ngModel)]="vinculo.veiculo1" placeholder="Placa 1" />
              <input class="pv-input" [(ngModel)]="vinculo.veiculo2" placeholder="Placa 2" />
            </div>
          </label>
          <label class="pv-label">
            <span>Motorista</span>
            <div class="inline">
              <input class="pv-input" [(ngModel)]="vinculo.motoristaTelefone" placeholder="Telefone" />
              <input class="pv-input" [(ngModel)]="vinculo.motoristaNome" placeholder="Nome" />
            </div>
          </label>
        </div>
      </div>

      <!-- Seção BOTTOM: Situação, Data Início, Data Fim -->
      <div class="motorista-section">
        <div class="form-grid cols-3">
          <label class="pv-label">
            <span>Situação Motorista</span>
            <select class="pv-input" [(ngModel)]="vinculo.situacaoMotorista">
              <option value="">Selecione</option>
              <option>Disponível</option>
              <option>Em viagem</option>
              <option>Folga</option>
              <option>Suspenso</option>
              <option>Aguardando Descarga</option>
            </select>
          </label>
          <label class="pv-label">
            <span>Data Início</span>
            <input class="pv-input" type="date" [(ngModel)]="vinculo.dataInicio" placeholder="dd/mm/aaaa" />
          </label>
          <label class="pv-label">
            <span>Data Fim</span>
            <input class="pv-input" type="date" [(ngModel)]="vinculo.dataFim" placeholder="dd/mm/aaaa" />
          </label>
        </div>
      </div>

      <!-- Checkbox -->
      <label class="checkbox pv-label">
        <input type="checkbox" [(ngModel)]="vinculoKeepMotorista" />
        <span>Não retirar motorista do veículo</span>
      </label>
    </div>
  </ng-template>

  <ng-template #tplGestor>
    <div class="motorista-form">
      <!-- Linha TOP: Data, Veículo (duas placas), Tipo Operação Frota -->
      <div class="motorista-section">
        <div class="form-grid cols-3">
          <label class="pv-label">
            <span>Data</span>
            <input class="pv-input" type="date" [(ngModel)]="vinculo.data" placeholder="dd/mm/aaaa" />
          </label>
          <label class="pv-label">
            <span>Veículo</span>
            <div class="inline">
              <input class="pv-input" [(ngModel)]="vinculo.veiculo1" placeholder="Placa 1" />
              <input class="pv-input" [(ngModel)]="vinculo.veiculo2" placeholder="Placa 2" />
            </div>
          </label>
          <label class="pv-label">
            <span>Tipo Operação Frota</span>
            <select class="pv-input" [(ngModel)]="vinculo.tipoOperacaoFrota">
              <option value="">Selecione</option>
              <option>LOG - XG05</option>
              <option>DISTRIBUIÇÃO URBANA</option>
              <option>LOG - CS</option>
              <option>TRANSFERÊNCIA</option>
              <option>LOG - CR</option>
            </select>
          </label>
        </div>
      </div>

      <!-- Linha Gestor: ID + Nome -->
      <div class="motorista-section">
        <div class="form-grid cols-3">
          <label class="pv-label">
            <span>Gestor</span>
            <div class="inline id-name">
              <input class="pv-input" [(ngModel)]="vinculo.gestorId" placeholder="ID" />
              <input class="pv-input" [(ngModel)]="vinculo.gestorNome" placeholder="Nome" />
            </div>
          </label>
        </div>
      </div>
    </div>
  </ng-template>

  <ng-template #tplEngate>
    <!-- Seção TOP: Data/Hora -->
    <div class="motorista-form">
      <div class="motorista-section">
        <div class="form-grid cols-3">
          <label class="pv-label">
            <span>Data</span>
            <input class="pv-input" type="date" [(ngModel)]="vinculo.data" placeholder="dd/mm/aaaa" />
          </label>
          <label class="pv-label">
            <span>Hora</span>
            <input class="pv-input" type="time" [(ngModel)]="vinculo.hora" placeholder="hh:mm" />
          </label>
          <label class="pv-label">
            <span>Veículo</span>
            <div class="inline">
              <input class="pv-input" [(ngModel)]="vinculo.veiculo1" placeholder="Placa 1" (ngModelChange)="onChangeVeiculo1($event)" />
              <input class="pv-input" [(ngModel)]="vinculo.veiculo2" placeholder="Placa 2" (ngModelChange)="onChangeVeiculo2($event)" />
            </div>
          </label>
        </div>
      </div>
    </div>

    <div class="engate-board">
      <div class="slots">
        <div class="slot vehicle">
          <span class="slot-corner-icon icon-cab" aria-hidden="true"></span>
          <div class="slot-title">Veículo</div>
          <div class="slot-body">
            <div class="plate-pill" [attr.aria-label]="'Placa do veículo ' + (engateVehiclePlate||'—')">{{ engateVehiclePlate || '—' }}</div>
          </div>
        </div>
        <div class="slot trailer"
             *ngFor="let s of engateSlots; let i = index"
             [class.filled]="!!s"
             [class.drag-over]="engateDragOverIndex===i"
             (dragenter)="onSlotDragEnter(i, $event)"
             (dragleave)="onSlotDragLeave(i)"
             (dragover)="onSlotDragOver(i, $event)"
             (drop)="onSlotDrop(i, $event)">
          <span class="slot-corner-icon icon-trailer" aria-hidden="true"></span>
          <div class="slot-title">Reboque {{ i + 1 }}</div>
          <div class="slot-body">
            <ng-container *ngIf="s; else emptySlot">
              <div class="plate-pill">
                {{ s }}
                <button class="icon remove" (click)="clearSlot(i)" aria-label="Remover placa">✕</button>
              </div>
            </ng-container>
            <ng-template #emptySlot>
              <div class="empty-drop">Arraste a placa aqui</div>
            </ng-template>
          </div>
        </div>
      </div>

      <div class="available-plates"
           [class.drag-over]="engateDragOverIndex===-1"
           (dragenter)="onAvailableDragEnter($event)"
           (dragleave)="onAvailableDragLeave()"
           (dragover)="onAvailableDragOver($event)"
           (drop)="onAvailableDrop($event)">
        <label class="search">
          <span>Pesquisar</span>
          <input class="pv-input" [(ngModel)]="engateQuery" placeholder="Placa" />
        </label>
        <div class="chips">
          <button class="plate-chip"
                  *ngFor="let p of platesFiltered"
                  [class.assigned]="isPlateAssigned(p)"
                  [attr.draggable]="!isPlateAssigned(p)"
                  (dragstart)="onPlateDragStart(p, $event)"
                  (click)="assignToNextSlot(p)"
                  type="button"
                  [attr.aria-disabled]="isPlateAssigned(p) ? true : null">
            {{ p }}
          </button>
        </div>
        <div class="hint">Arraste uma placa para um reboque, ou clique para preencher o próximo vazio. Para remover, arraste a placa de volta para esta área.</div>
      </div>
    </div>

  </ng-template>

  <ng-template #tplTipoConjunto>
    <div class="motorista-form">
      <div class="motorista-section">
        <div class="form-grid cols-3">
          <label class="pv-label grow">
            <span>Veículo</span>
            <div class="inline">
              <input class="pv-input" [(ngModel)]="vinculo.veiculo1" placeholder="Placa 1" />
              <input class="pv-input" [(ngModel)]="vinculo.veiculo2" placeholder="Placa 2" />
            </div>
          </label>
          <label class="pv-label">
            <span>Tipo Conjunto Veículo</span>
            <select class="pv-input" [(ngModel)]="vinculo.tipoConjuntoVeiculo">
              <option value="">Selecione</option>
              <option>LS</option>
              <option>Carreta</option>
              <option>Bitrem</option>
              <option>Rodotrem</option>
            </select>
          </label>
        </div>
      </div>
    </div>
  </ng-template>
