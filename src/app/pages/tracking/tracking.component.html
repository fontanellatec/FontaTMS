<div class="tracking-page">
  <app-filter-section
    [title]="'Filtros de Rastreamento'"
    [filters]="filterConfigs"
    [collapsed]="true"
    (filtersChange)="onFiltersChange($event)"
    (applyFilters)="onApplyFilters($event)"
    (clearFilters)="onClearFilters()"
  ></app-filter-section>

  <app-kpi-section
    [title]="'Métricas'"
    [kpis]="kpiConfigs"
    [collapsed]="false"
  ></app-kpi-section>

  <div class="content-grid">
    <div class="card map-card" style="grid-column: 1 / -1;">
      <div class="map-canvas">
        <iframe id="map-iframe" title="Mapa de Rastreamento"
                src="/assets/mockups/rastreamento.html?embed=1"
                class="map-element" style="border:0;"></iframe>
      </div>
    </div>
  </div>
</div>
