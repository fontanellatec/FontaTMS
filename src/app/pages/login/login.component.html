<div class="login-container">
  <div class="login-card card">
    <div class="login-header">
      <div class="login-brand">
        <img src="/brand/fontaTmsIcon.png" alt="FontaTMS" class="brand-icon" />
        <img src="/brand/FontaTmsText.png" alt="FontaTMS" class="brand-text" />
      </div>
    </div>

    <p class="login-subtitle" aria-label="Descrição do sistema">Sistema de Gestão de Transporte</p>

    <!-- Login Form -->
    <form class="login-form" (ngSubmit)="onLogin()" #f="ngForm" novalidate>
      <div class="form-group">
        <label for="username" class="form-label">Nome de Usuário</label>
        <input
          type="text"
          id="username"
          class="form-input"
          [(ngModel)]="username"
          name="username"
          #usernameModel="ngModel"
          required
          minlength="3"
          placeholder="Digite seu nome de usuário"
          [attr.aria-invalid]="usernameModel.invalid && (usernameModel.dirty || usernameModel.touched)"
        />
        <div class="validation" *ngIf="usernameModel.invalid && (usernameModel.dirty || usernameModel.touched)">
          <span *ngIf="usernameModel.errors?.['required']">Informe o usuário.</span>
          <span *ngIf="usernameModel.errors?.['minlength']">Mínimo de 3 caracteres.</span>
        </div>
      </div>

      <div class="form-group">
        <label for="password" class="form-label">Senha</label>
        <div class="password-wrapper">
          <input
            [type]="showPassword ? 'text' : 'password'"
            id="password"
            class="form-input"
            [(ngModel)]="password"
            name="password"
            #passwordModel="ngModel"
            required
            minlength="6"
            placeholder="Digite sua senha"
            [attr.aria-invalid]="passwordModel.invalid && (passwordModel.dirty || passwordModel.touched)"
          />
          <button type="button" class="password-toggle-btn" (click)="togglePasswordVisibility()" [attr.aria-pressed]="showPassword" [attr.aria-label]="showPassword ? 'Ocultar senha' : 'Mostrar senha'">
            {{ showPassword ? 'Ocultar' : 'Mostrar' }}
          </button>
        </div>
        <div class="validation" *ngIf="passwordModel.invalid && (passwordModel.dirty || passwordModel.touched)">
          <span *ngIf="passwordModel.errors?.['required']">Informe a senha.</span>
          <span *ngIf="passwordModel.errors?.['minlength']">Mínimo de 6 caracteres.</span>
        </div>
      </div>


      <button type="submit" class="btn btn-primary w-full" [disabled]="f.invalid">
        Entrar
      </button>

      <div class="login-actions">
        <button type="button" class="link-btn" (click)="onForgotPassword()">Esqueci a minha senha</button>
      </div>
    </form>

    <div class="login-footer">
      <p>&copy; 2024 FontaTMS</p>
    </div>
  </div>
</div>
