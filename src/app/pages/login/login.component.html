<div class="login-container">
  <div class="login-card card">
    <!-- Logo and Brand -->
    <div class="login-header">
      <div class="login-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9,22 9,12 15,12 15,22"/>
        </svg>
      </div>
      <h1 class="login-title">
        <span class="brand-name">FontaTec</span>
        <span class="brand-subtitle">ERP</span>
      </h1>
    </div>

    <!-- Login Form -->
    <form class="login-form" (ngSubmit)="onLogin()" #f="ngForm" novalidate>
      <div class="form-group">
        <label for="username" class="form-label">Nome de Usuário</label>
        <input
          type="text"
          id="username"
          class="form-input"
          [(ngModel)]="username"
          name="username"
          #usernameModel="ngModel"
          required
          minlength="3"
          placeholder="Digite seu nome de usuário"
          [attr.aria-invalid]="usernameModel.invalid && (usernameModel.dirty || usernameModel.touched)"
        />
        <div class="validation" *ngIf="usernameModel.invalid && (usernameModel.dirty || usernameModel.touched)">
          <span *ngIf="usernameModel.errors?.['required']">Informe o usuário.</span>
          <span *ngIf="usernameModel.errors?.['minlength']">Mínimo de 3 caracteres.</span>
        </div>
      </div>

      <div class="form-group">
        <label for="password" class="form-label">Senha</label>
        <div class="password-wrapper">
          <input
            [type]="showPassword ? 'text' : 'password'"
            id="password"
            class="form-input"
            [(ngModel)]="password"
            name="password"
            #passwordModel="ngModel"
            required
            minlength="6"
            placeholder="Digite sua senha"
            [attr.aria-invalid]="passwordModel.invalid && (passwordModel.dirty || passwordModel.touched)"
          />
          <button type="button" class="password-toggle-btn" (click)="togglePasswordVisibility()" [attr.aria-pressed]="showPassword" [attr.aria-label]="showPassword ? 'Ocultar senha' : 'Mostrar senha'">
            {{ showPassword ? 'Ocultar' : 'Mostrar' }}
          </button>
        </div>
        <div class="validation" *ngIf="passwordModel.invalid && (passwordModel.dirty || passwordModel.touched)">
          <span *ngIf="passwordModel.errors?.['required']">Informe a senha.</span>
          <span *ngIf="passwordModel.errors?.['minlength']">Mínimo de 6 caracteres.</span>
        </div>
      </div>

      <div class="form-row">
        <label class="checkbox-label">
          <input type="checkbox" [(ngModel)]="rememberMe" name="rememberMe" />
          <span>Lembrar-me</span>
        </label>
        <button type="button" class="link-btn" (click)="onForgotPassword()">Esqueci a senha</button>
      </div>

      <button type="submit" class="btn btn-primary w-full" [disabled]="f.invalid">
        Entrar
      </button>

      <div class="login-actions">
        <span class="muted-text">Não tem conta?</span>
        <button type="button" class="link-btn" (click)="onRegister()">Criar conta</button>
      </div>
    </form>

    <!-- Footer -->
    <div class="login-footer">
      <p>&copy; 2024 FontaTec</p>
    </div>
  </div>
</div>
