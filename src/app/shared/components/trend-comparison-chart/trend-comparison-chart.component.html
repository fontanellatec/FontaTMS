<div class="trend-card">
  <div class="header">
    <div class="title">{{ title }}</div>
    <div class="subtitle" *ngIf="subtitle">{{ subtitle }}</div>
    <div class="legend">
      <span class="legend-item"><span class="dot" [style.background]="colorA"></span>% km vazio</span>
      <span class="legend-item"><span class="dot" [style.background]="colorB"></span>Custo por km</span>
      <span class="legend-item"><span class="dash" [style.background]="metaColor"></span>Meta</span>
    </div>
  </div>

  <svg [attr.viewBox]="'0 0 ' + width + ' ' + height" class="chart"
       (mousemove)="onMouseMove($event)" (mouseleave)="onMouseLeave()">
    <defs>
      <linearGradient id="areaA" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" [attr.stop-color]="colorA" stop-opacity="0.25"/>
        <stop offset="100%" [attr.stop-color]="colorA" stop-opacity="0.02"/>
      </linearGradient>
    </defs>

    <!-- Área sombreada sob a série A -->
    <polygon [attr.points]="areaA" fill="url(#areaA)"></polygon>

    <!-- Linhas principais -->
    <polyline [attr.points]="polylineA" [attr.stroke]="colorA" stroke-width="2" fill="none"></polyline>
    <polyline [attr.points]="polylineB" [attr.stroke]="colorB" stroke-width="2" fill="none"></polyline>

    <!-- Meta (tracejado) -->
    <polyline *ngIf="polylineMeta" [attr.points]="polylineMeta" [attr.stroke]="metaColor" stroke-width="1.5" fill="none" stroke-dasharray="4 4"></polyline>

    <!-- Pontos para tooltips -->
    <ng-container *ngFor="let p of pointsA; let i = index">
      <circle [attr.cx]="p.x" [attr.cy]="p.y" r="2.5" [attr.fill]="colorA"></circle>
    </ng-container>
    <ng-container *ngFor="let p of pointsB; let i = index">
      <circle [attr.cx]="p.x" [attr.cy]="p.y" r="2.5" [attr.fill]="colorB"></circle>
    </ng-container>

    <!-- Tooltip -->
    <g *ngIf="tooltip" class="tooltip">
      <rect [attr.x]="tooltip.x" [attr.y]="tooltip.y - 28" rx="6" ry="6" width="180" height="28" fill="#0f172a" opacity="0.9"></rect>
      <text [attr.x]="tooltip.x + 8" [attr.y]="tooltip.y - 12" fill="#e2e8f0" font-size="10">
        {{ tooltip.label }} · A: {{ tooltip.a | number:'1.2-2' }} ({{ tooltip.aDelta != null ? (tooltip.aDelta >= 0 ? '+' : '') : ''}}{{ tooltip.aDelta != null ? (tooltip.aDelta | number:'1.2-2') : '' }}) · B: {{ tooltip.b | number:'1.2-2' }} ({{ tooltip.bDelta != null ? (tooltip.bDelta >= 0 ? '+' : '') : ''}}{{ tooltip.bDelta != null ? (tooltip.bDelta | number:'1.2-2') : '' }})
      </text>
    </g>
  </svg>
</div>
