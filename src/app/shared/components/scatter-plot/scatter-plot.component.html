<div class="chart-card">
  <div class="header">
    <div class="titles">
      <div class="title">{{ title }}</div>
      <div class="subtitle" *ngIf="subtitle">{{ subtitle }}</div>
    </div>
  </div>

  <svg [attr.width]="width" [attr.height]="height">
    <g>
      <line [attr.x1]="padding.left" [attr.y1]="padding.top + innerH" [attr.x2]="padding.left + innerW" [attr.y2]="padding.top + innerH" stroke="#e5e7eb" />
      <line [attr.x1]="padding.left" [attr.y1]="padding.top" [attr.x2]="padding.left" [attr.y2]="padding.top + innerH" stroke="#e5e7eb" />
      <text [attr.x]="padding.left + innerW / 2" [attr.y]="padding.top + innerH + 24" text-anchor="middle" class="axis-label">{{ xLabel }}</text>
      <text [attr.x]="padding.left - 34" [attr.y]="padding.top + innerH / 2" text-anchor="middle" class="axis-label rotate">{{ yLabel }}</text>
    </g>

    <g *ngFor="let p of points">
      <circle [attr.cx]="x(p.x)" [attr.cy]="y(p.y)" [attr.r]="r(p.size)" [attr.fill]="p.color || '#3b82f6'" fill-opacity="0.7" stroke="#1f2937" />
      <title>{{ p.label }}\nX: {{ p.x }}\nY: {{ p.y }}</title>
    </g>
  </svg>
</div>
